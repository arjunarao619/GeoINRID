# lightning.pytorch==2.0.0
seed_everything: 0
trainer:
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: GeoCLIP
      entity: geoclip
      log_model: True
      save_code: True
  callbacks:
      class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_loss"
        save_last: True
        filename: "{epoch}-{val_loss:.2f}"
  max_epochs: 100
model:
  embed_dim: 64
  image_resolution: 256
  vision_layers: "rcf"
  vision_width: 768
  vision_patch_size: 32
  in_channels: 4
  le_type: "spherical"
  frequency_num: 16
  num_hidden_layers: 2
  capacity: 128
  max_radius: 0.01
  min_radius: 0.0001
  learning_rate: 0.0001
data:
  data_dir: /home/esther/geoclip/data/naip_geoclip
  batch_size: 128
  num_workers: 4
  transform: null
  subset: 'sw'