# lightning.pytorch==2.0.0
seed_everything: 0
trainer:
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: GeoCLIP
      entity: geoclip
      log_model: True
      save_code: True
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_loss"
        save_last: True
        filename: "{epoch}-{val_loss:.2f}"
  max_epochs: 500
model:
  embed_dim: 256
  image_resolution: 256
  vision_layers: 4
  vision_width: 128
  vision_patch_size: 32
  in_channels: 4
  le_type: spherical
  frequency_num: 16
  max_radius: 0.01
  min_radius: 0.00001
  legendre_polys: 32
  sh_embedding_dims: 32
  learning_rate: 0.0001
  num_hidden_layers: 2
  capacity: 256
  eval_downstream: True
  air_temp_data_path: '/data/air_temp_us'
  election_data_path: '/data/election'
data:
  data_dir: '/home/kklemmer/clayclip/embeddings.csv'
  batch_size: 2048
  num_workers: 8
  val_random_split_fraction: 0.1
watchmodel: True
